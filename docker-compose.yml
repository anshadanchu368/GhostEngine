version: "3.9"

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - node
    networks:
      - ghostnet

  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - python
    volumes:
      - /dev/shm:/dev/shm
      - ./node/src:/app/src
    networks:
      - ghostnet

  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    env_file: .env
    shm_size: "1gb"
    volumes:
      - /dev/shm:/dev/shm
      - ./python/app:/app/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ghostnet

networks:
  ghostnet:
    driver: bridge
